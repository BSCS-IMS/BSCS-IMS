<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Brand color detection -->
  <meta name="theme-color" content="#b49cff" />

  <title>Loader Test</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: system-ui, sans-serif;
    }

    main {
      padding: 40px;
    }
  </style>
</head>
<body>

<main>
  <h1>Website Content</h1>
  <p>
    This content will appear only after the loader is removed.
  </p>
</main>

<!-- =========================
     LOADER MARKUP
========================= -->
<div id="loader-overlay">
  <div id="loader-container"></div>
  <div id="loader-notice">
    Still loading… try refreshing the page.
  </div>
</div>

<!-- =========================
     LOADER STYLES
========================= -->
<style>
  #loader-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;

    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    transition: opacity 0.5s ease;
  }

  @media (prefers-color-scheme: dark) {
    #loader-overlay {
      background: rgba(10,10,20,0.4);
    }
  }

  #loader-container {
    position: relative;
    width: 88px;
    height: 88px;
  }

  .grain {
    position: absolute;
    width: 8px;
    height: 14px;
    border-radius: 50%;
    background: var(--brand-color, #b49cff);
    opacity: 0.85;
  }

  #loader-notice {
    font-size: 14px;
    padding: 10px 16px;
    border-radius: 12px;

    background: white;
    color: #333;

    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    opacity: 0;

    transition: opacity 0.4s ease;
  }

  @media (prefers-color-scheme: dark) {
    #loader-notice {
      background: #1a1a2e;
      color: #eee;
    }
  }
</style>

<!-- =========================
     LOADER LOGIC
========================= -->
<script>
  let pageReady = false;
  let apiReady = false;
  let running = true;

  const overlay = document.getElementById("loader-overlay");
  const container = document.getElementById("loader-container");
  const notice = document.getElementById("loader-notice");

  /* --------------------------
     BRAND COLOR DETECTION
  ---------------------------*/
  const metaColor = document.querySelector('meta[name="theme-color"]');
  const brandColor = metaColor ? metaColor.content : "#b49cff";
  document.documentElement.style.setProperty("--brand-color", brandColor);

  /* --------------------------
     WHEAT GRAIN SETUP
  ---------------------------*/
  const grainCount = 12;
  const radius = 34;
  const grains = [];

  for (let i = 0; i < grainCount; i++) {
    const g = document.createElement("div");
    g.className = "grain";
    container.appendChild(g);
    grains.push(g);
  }

  /* --------------------------
     ANIMATION LOOP
  ---------------------------*/
  let angle = 0;
  let pulse = 0;

  function animate() {
    if (!running) return;

    angle += 0.6;
    pulse += 0.04;

    container.style.opacity = 0.65 + Math.sin(pulse) * 0.2;

    grains.forEach((grain, i) => {
      const theta = (360 / grainCount) * i + angle;
      const rad = theta * Math.PI / 180;

      const x = Math.cos(rad) * radius;
      const y = Math.sin(rad) * radius;

      grain.style.transform = `
        translate(${44 + x}px, ${44 + y}px)
        rotate(${theta}deg)
      `;
    });

    requestAnimationFrame(animate);
  }

  animate();

  /* --------------------------
     LOADER REMOVAL
  ---------------------------*/
  function tryRemove() {
    if (pageReady && apiReady) {
      running = false;
      overlay.style.opacity = "0";
      setTimeout(() => overlay.remove(), 600);
    }
  }

  window.addEventListener("load", () => {
    pageReady = true;
    tryRemove();
  });

  /* --------------------------
     SIMULATED API LOAD
     (change delay to test)
  ---------------------------*/
  setTimeout(() => {
    apiReady = true;
    tryRemove();
  }, 4000);

  /* --------------------------
     TIMEOUT NOTICE
  ---------------------------*/
  setTimeout(() => {
    if (running) notice.style.opacity = "1";
  }, 8000);
</script>

</body>
</html>
